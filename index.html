<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Doraemon Interactivo</title>
</head>
<body>
    <h1>¡Alimenta a Doraemon!</h1>
    <div class="game-container">
        <div class="doraemon" id="doraemon">
            <div class="head">
                <div class="face">
                    <div class="eyes">
                        <div class="eye"><div class="pupil"></div></div>
                        <div class="eye"><div class="pupil"></div></div>
                    </div>
                    <div class="nose"></div>
                    <div class="mouth" id="mouth"></div>
                </div>
            </div>
            <div class="body">
                <div class="belly" id="belly">
                    <div class="pocket"></div>
                </div>
            </div>
        </div>
        
        <button class="dorayaki-btn" id="dorayakiBtn">🥞 Dar Dorayaki</button>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
